{% assign hero = site.hero | default: site.data.theme.hero | default: [] %}
<section>
  <div class="flex items-center gap-4 mb-4">
    <img src="{{"/assets/images/profile.jpg" | relative_url }}" alt="{{ hero.name }}"
      class="w-24 h-24 rounded-full object-cover border-2 border-lime-500 dark:border-lime-300" />
    <div>
      <h1 class="sm:text-2xl md:text-3xl text-lg font-semibold">Hello, I'm <span
          class="text-blue-600 dark:text-blue-300">{{ hero.name }}</span>.</h1>
      <p class="sm:text-lg md:text-xl text-lg">
        A <span class="border-b-2 border-lime-500 dark:border-lime-300">{{ hero.title }}</span> 
        based in {{ hero.location }}.
      </p>
    </div>
  </div>

  <p class="my-12 pl-4 border-l-2 border-lime-500 dark:border-lime-300 text-lg">
    {{ hero.bio }}
  </p>
</section>
