---
layout: page
---
<article class="post">
  <!-- Post Header -->
  <header>
    <h1>{{ page.title }}</h1>
    <h6>Published on {{ page.date | date: "%B %d, %Y" }}</h6>
  </header>

  <!-- Post Content -->
  <div class="post-content">
    {{ content }}
  </div>
</article>

<!-- Back to Index Link -->
<div class="back">
  <a href="/notes"
    class="link">
    ← Back to index
  </a>
</div>
